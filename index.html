<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Kalkulator Elektronik</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!-- Calculator body -->
         <div class="calculator">
            <!-- Calculator display -->
            <div class="calculator-display">
                <p class="reOutput"></p>
                <p class="output"></p>
            </div>
            <!-- Calculator board -->
            <div class="calculator-board">
                <div class="calculator-row">
                    <button class="btn-other clear">AC</button>
                    <button class="btn-other function">+/-</button>
                    <button class="btn-other persent">%</button>
                    <button class="btn-operator operator">÷</button>
                </div>
                <!-- Seperator -->
                <div class="calculator-row">
                    <button class="btn-number number">7</button>
                    <button class="btn-number number">8</button>
                    <button class="btn-number number">9</button>
                    <button class="btn-operator operator">×</button>
                </div>

                <!-- Seperator -->
                <div class="calculator-row">
                    <button class="btn-number number">4</button>
                    <button class="btn-number number">5</button>
                    <button class="btn-number number">6</button>
                    <button class="btn-operator operator">-</button>
                </div>

                <!-- Seperator -->
                <div class="calculator-row">
                    <button class="btn-number number">1</button>
                    <button class="btn-number number">2</button>
                    <button class="btn-number number">3</button>
                    <button class="btn-operator operator">+</button>
                </div>

                <!-- Seperator -->
                <div class="calculator-row">
                    <button class="btn-number number" id="btn-zero">0</button>
                    <button class="btn-other decimal">.</button>
                    <button class="btn-operator equals">=</button>              
                </div>

            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
